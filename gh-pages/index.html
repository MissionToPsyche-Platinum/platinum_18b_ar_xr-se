<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Psyche Hub</title>
  <style>
    :root {
      --psyche-black: #12031d;
      --psyche-dark-purple: #302144;
      --psyche-purple: #592651;
      --psyche-magenta: #a53f5b;
      --psyche-coral: #ef5966;
      --psyche-gold: #f47c33;
      --psyche-mustard: #f9a000;
      --text-main: #fff4e8;
      --text-soft: #e8cfc3;
      --border-soft: rgba(255, 255, 255, 0.14);
      --panel-bg: rgba(18, 3, 29, 0.72);
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: system-ui, sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
      overflow-y: auto;
    }

    .bg-sky {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(249, 160, 0, 0.12), transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(239, 89, 102, 0.14), transparent 28%),
        linear-gradient(
          180deg,
          var(--psyche-dark-purple) 0%,
          var(--psyche-purple) 35%,
          var(--psyche-black) 100%
        );
      z-index: 0;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px 32px;
      box-sizing: border-box;
      text-align: center;
    }

    .hub-card {
      width: min(95vw, 900px);
      margin-top: 10px;
      background: var(--panel-bg);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      padding: 24px 18px;
      box-shadow:
        0 0 30px rgba(0, 0, 0, 0.35),
        0 0 24px rgba(244, 124, 51, 0.12);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.15;
      color: var(--psyche-mustard);
      text-shadow: 0 0 14px rgba(249, 160, 0, 0.35);
    }

    p {
      margin: 0.35rem 0 1rem;
      font-size: 0.98rem;
      color: var(--text-soft);
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .game-tile {
      display: block;
      text-decoration: none;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(249, 160, 0, 0.18);
      background: rgba(89, 38, 81, 0.45);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .game-tile:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: rgba(249, 160, 0, 0.5);
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.3),
        0 0 18px rgba(244, 124, 51, 0.22);
    }

    .game-tile img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #1a1024;
    }

    .game-label {
      padding: 10px 8px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      background: linear-gradient(
        135deg,
        rgba(165, 63, 91, 0.92),
        rgba(89, 38, 81, 0.96)
      );
    }

    .footer {
      margin-top: 20px;
      font-size: 0.88rem;
      color: #d8b6a7;
    }

    @media (max-width: 600px) {
      .content {
        padding: 14px 10px 24px;
      }

      .hub-card {
        padding: 18px 12px;
        border-radius: 18px;
      }

      h1 {
        font-size: 1.55rem;
      }

      p {
        font-size: 0.92rem;
        margin-bottom: 0.8rem;
      }

      .game-grid {
        gap: 10px;
        margin-top: 14px;
      }

      .game-tile img {
        aspect-ratio: 16 / 8;
      }

      .game-label {
        padding: 8px 6px;
        font-size: 0.82rem;
      }

      .footer {
        margin-top: 14px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-sky"></div>
  <canvas id="stars"></canvas>

  <main class="content">
    <section class="hub-card">
      <h1>Project Psyche App Hub</h1>
      <p>Select an experience:</p>

      <div class="game-grid">
        <a class="game-tile" href="../Asteroid Dodge Game/index.html" target="_blank">
          <img src="Assets/Meteoroid_Dodge.png" alt="Meteoroid Dodge Game" />
          <div class="game-label">Meteoroid Dodge Game</div>
        </a>

        <a class="game-tile" href="../Metal Activity/asteroid.html" target="_blank">
          <img src="Assets/Metal_Activity.png" alt="Metal Activity" />
          <div class="game-label">Metal Activity</div>
        </a>

        <a class="game-tile" href="../Button Masher/index.html" target="_blank">
          <img src="Assets/Button_Masher.png" alt="Button Masher" />
          <div class="game-label">Button Masher</div>
        </a>

        <a class="game-tile" href="../Orbit Facts/index.html" target="_blank">
          <img src="Assets/Orbit_Facts.png" alt="Orbit Facts" />
          <div class="game-label">Orbit Facts</div>
        </a>
      </div>

      <p class="footer">Currently a work in progress.</p>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    let stars = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = [];
      for (let i = 0; i < 200; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.2,
          o: Math.random(),
          d: Math.random() * 0.02 + 0.005,
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 244, 232, ${s.o})`;
        ctx.fill();

        s.o += s.d;
        if (s.o <= 0 || s.o >= 1) s.d = -s.d;
      }
      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resize);
    resize();
    animate();
  </script>
</body>
</html>
